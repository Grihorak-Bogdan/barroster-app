services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: barroster
      POSTGRES_USER: barroster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barroster_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barroster"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://barroster:${POSTGRES_PASSWORD:-barroster_dev}@postgres:5432/barroster
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DEBUG: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-60}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-30}
      SECURE_SSL_REDIRECT: "false"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${PORT:-80}:80"

volumes:
  postgres_data:
